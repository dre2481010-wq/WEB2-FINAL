<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <title>Change Password</title>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="card mx-auto" style="max-width: 450px;">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">Change Password</h4>
        </div>
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/profile/change-password}" th:object="${passwordRequest}" method="post">
                <div class="mb-3">
                    <label class="form-label">Password Lama</label>
                    <input type="password" th:field="*{oldPassword}" class="form-control" required>
                </div>
                <hr>
                <div class="mb-3">
                    <label class="form-label">Password Baru</label>
                    <input type="password" th:field="*{newPassword}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Konfirmasi Password Baru</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger">Update Password</button>
                    <a th:href="@{/profile}" class="btn btn-secondary">Batal</a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
