<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Product CRUD</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body class="bg-gray-100">
<div class="min-h-screen flex items-center justify-center py-10">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow p-6">

            <h3 class="text-2xl font-semibold text-center mb-6">Register</h3>

            <!-- Error message -->
            <div th:if="${error}"
                 class="bg-red-100 text-red-700 p-3 rounded mb-4"
                 th:text="${error}">
            </div>

            <form th:action="@{/register}" th:object="${registerRequest}" method="post">

                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                        Username
                    </label>
                    <input type="text"
                           id="username"
                           th:field="*{username}"
                           placeholder="Masukkan username"
                           required autofocus
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <div class="mb-4">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        Password
                    </label>
                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           placeholder="Masukkan password"
                           required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">
                        Konfirmasi Password
                    </label>
                    <input type="password"
                           id="confirmPassword"
                           th:field="*{confirmPassword}"
                           placeholder="Ulangi password"
                           required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <button type="submit"
                        class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-md transition">
                    Daftar
                </button>
            </form>

            <div class="text-center mt-4 text-sm">
                <span>Sudah punya akun? </span>
                <a th:href="@{/login}" class="text-green-600 hover:underline">
                    Login di sini
                </a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
