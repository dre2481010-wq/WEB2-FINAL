<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Daftar Produk</h2>

        <!-- Bungkus search + tombol -->
        <div class="d-flex gap-2">
            <!-- Search Bar -->
            <form th:action="@{/products}" method="get" class="d-flex">
                <input type="text" name="keyword" class="form-control"
                       placeholder="Cari produk..." th:value="${param.keyword}">
                <button type="submit" class="btn btn-primary ms-2">Search</button>
            </form>

            <!-- Tombol Tambah -->
            <a th:href="@{/products/new}" class="btn btn-success">
                + Tambah Produk Baru
            </a>
        </div>
    </div>

        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Product Count -->
        <p class="text-muted">
            Total produk: <strong th:text="${#lists.size(products)}">0</strong>
        </p>

        <!-- Product Table -->
        <div th:if="${!#lists.isEmpty(products)}">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Kategori</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product, iterStat : ${products}">
                        <td th:text="${iterStat.index + 1}">1</td>
                        <td th:text="${product.name}">Nama Produk</td>
                        <td th:text="${product.category?.displayName}">Kategori</td>
                        <td th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 0</td>
                        <td th:text="${product.stock}">0</td>
                        <td>
                            <span th:if="${product.active}" class="badge bg-success">Aktif</span>
                            <span th:unless="${product.active}" class="badge bg-danger">Tidak Aktif</span>
                        </td>
                        <td>
                            <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">Detail</a>
                            <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning btn-sm">Edit</a>
                            <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display:inline;"
                                  onsubmit="return confirm('Apakah Anda yakin ingin menghapus produk ini?');">
                                <button type="submit" class="btn btn-danger btn-sm">Hapus</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <form th:action="@{/products}" method="get" class="d-flex gap-2">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Cari produk..." th:value="${keyword}">

            <!-- Dropdown filter baru -->
            <select name="category" class="form-select">
                <option value="">Semua Kategori</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat}"
                        th:text="${cat.displayName}"
                        th:selected="${cat == selectedCategory}">
                </option>
            </select>

            <nav th:if="${totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <!-- Prev -->
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, category=${selectedCategory})}">
                            &laquo;
                        </a>
                    </li>

                    <!-- Nomor halaman -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/products(page=${i}, keyword=${keyword}, category=${selectedCategory})}"
                           th:text="${i + 1}">
                        </a>
                    </li>

                    <!-- Next -->
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, category=${selectedCategory})}">
                            &raquo;
                        </a>
                    </li>
                </ul>
            </nav>

            <button type="submit" class="btn btn-primary">Filter</button>
            <a th:href="@{/products}" class="btn btn-outline-secondary">Reset</a>
        </form>

            <!-- Empty State -->
        <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
            <p class="text-muted fs-5">Belum ada produk.</p>
            <a th:href="@{/products/new}" class="btn btn-primary">Tambah Produk Pertama</a>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
